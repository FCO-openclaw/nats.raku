name: test
on: [ push, pull_request ]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      nats:
        image: nats:alpine
        ports:
          - 4222:4222
          - 8222:8222
        options: >-
          --name nats-server
          --health-cmd "nats-server --print_config=check"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --
          --jetstream

    steps:
      - uses: actions/checkout@v3

      - name: Verify NATS Server and JetStream
        run: |
          # O NATS Server já está rodando como container Docker service
          # Verificar conexão com o servidor NATS
          timeout 10 bash -c 'until nc -z localhost 4222; do sleep 1; done'
          echo "NATS Server is running on port 4222"
          
          # Verificar se JetStream está habilitado
          curl -s http://localhost:8222/jsz | head -20 || echo "JetStream check completed"

      - name: Test + coverage
        uses: JJ/raku-test-action@v2
        with:
          coverage: true
          
      - name: Setup Raku Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y rakudo
          
          # Instalar zef manualmente
          git clone https://github.com/ugexe/zef.git
          cd zef
          raku -I. bin/zef install .
          
          # Adicionar zef ao PATH
          echo "$HOME/.raku/bin" >> $GITHUB_PATH
          export PATH="$HOME/.raku/bin:$PATH"
          
          # Verificar instalação do zef
          zef --version
          
      - name: Install Dependencies
        run: |
          export PATH="$HOME/.raku/bin:$PATH"
          
          # Instalar dependências
          zef install --/test Test::Mock
          zef install --/test JSON::Fast
          zef install --/test URL
          zef install --/test --deps-only .