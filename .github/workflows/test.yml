name: test
on: [ push, pull_request ]
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Start NATS Server with JetStream
        run: |
          docker run -d --name nats-server -p 4222:4222 -p 8222:8222 nats:alpine --jetstream --http_port 8222
          
          # Aguardar o servidor iniciar
          timeout 30 bash -c 'until nc -z localhost 4222; do sleep 1; done'
          echo "NATS Server is running on port 4222"
          
          # Verificar JetStream
          curl -s http://localhost:8222/jsz | head -5 || echo "JetStream check completed"

      - name: Setup Raku Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y rakudo
          
          # Instalar zef manualmente
          git clone https://github.com/ugexe/zef.git
          cd zef
          raku -I. bin/zef install .
          
          # Adicionar zef ao PATH
          echo "$HOME/.raku/bin" >> $GITHUB_PATH
          export PATH="$HOME/.raku/bin:$PATH"
          
          # Verificar instalação do zef
          zef --version
          
      - name: Install Dependencies
        run: |
          export PATH="$HOME/.raku/bin:$PATH"
          
          # Instalar dependências
          zef install --/test Test::Mock
          zef install --/test JSON::Fast
          zef install --/test URL
          zef install --/test --deps-only .
          
      - name: Run Tests with Coverage
        run: |
          export PATH="$HOME/.raku/bin:$PATH"
          
          # Criar diretório para relatórios
          mkdir -p coverage
          
          # Rodar testes com cobertura usando App::Prove6 com Cover
          # Primeiro, instalar o módulo de cobertura se necessário
          zef install --/test App::Prove6 2>/dev/null || true
          
          # Rodar testes e gerar relatório de cobertura
          # Usar raku com -Ilib e executar todos os testes
          for f in t/*.rakutest; do
            echo "Running $f"
            raku -Ilib "$f" || true
          done
          
          # Se houver ferramenta de cobertura, usar
          # Por enquanto, apenas mostramos o status dos testes
          echo "Tests completed"
          
      - name: Test + coverage (Raku Action)
        uses: JJ/raku-test-action@v2
        with:
          coverage: true
          
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/*.json,./coverage/*.lcov
          flags: unittests
          name: nats-raku-coverage
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          
      - name: Generate Coverage Report Summary
        run: |
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Test execution completed. Coverage report uploaded to Codecov." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Files" >> $GITHUB_STEP_SUMMARY
          ls -1 t/*.rakutest | wc -l >> $GITHUB_STEP_SUMMARY
          echo " test files executed" >> $GITHUB_STEP_SUMMARY
