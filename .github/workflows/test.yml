name: test
on: [ push, pull_request ]
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Start NATS Server with JetStream
        run: |
          docker run -d --name nats-server -p 4222:4222 -p 8222:8222 nats:alpine --jetstream --http_port 8222
          
          # Aguardar o servidor iniciar
          timeout 30 bash -c 'until nc -z localhost 4222; do sleep 1; done'
          echo "NATS Server is running on port 4222"
          
          # Verificar JetStream
          curl -s http://localhost:8222/jsz | head -5 || echo "JetStream check completed"

      - name: Test + coverage
        uses: JJ/raku-test-action@v2
        with:
          coverage: true
          
      - name: Setup Raku Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y rakudo
          
          # Instalar zef manualmente
          git clone https://github.com/ugexe/zef.git
          cd zef
          raku -I. bin/zef install .
          
          # Adicionar zef ao PATH
          echo "$HOME/.raku/bin" >> $GITHUB_PATH
          export PATH="$HOME/.raku/bin:$PATH"
          
          # Verificar instalação do zef
          zef --version
          
      - name: Install Dependencies
        run: |
          export PATH="$HOME/.raku/bin:$PATH"
          
          # Instalar dependências
          zef install --/test Test::Mock
          zef install --/test JSON::Fast
          zef install --/test URL
          zef install --/test --deps-only .
