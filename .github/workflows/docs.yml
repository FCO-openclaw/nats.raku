name: Documentation

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Raku
        run: |
          sudo apt-get update
          sudo apt-get install -y rakudo
          
          # Install zef
          git clone https://github.com/ugexe/zef.git /tmp/zef
          cd /tmp/zef
          raku -I. bin/zef install .
          echo "$HOME/.raku/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          export PATH="$HOME/.raku/bin:$PATH"
          zef install --/test Pod::To::Markdown || true

      - name: Generate Markdown from POD6
        run: |
          export PATH="$HOME/.raku/bin:$PATH"
          mkdir -p _site/api
          
          # Generate markdown for each .rakumod file
          find lib -name "*.rakumod" | while read file; do
            module_name=$(echo "$file" | sed 's|lib/||' | sed 's|/|::|g' | sed 's|.rakumod||')
            output_file=$(echo "$file" | sed 's|lib/||' | sed 's|/|_|g' | sed 's|.rakumod|.md|')
            
            echo "Processing: $file -> $output_file"
            
            # Try to convert POD to Markdown
            raku -e "
              use Pod::To::Markdown;
              my \$pod = Pod::Load.load('$file');
              print Pod::To::Markdown.render(\$pod);
            " > "_site/api/$output_file" 2>/dev/null || echo "# $module_name\n\nPOD documentation for $module_name" > "_site/api/$output_file"
          done
          
          # Generate index
          echo "# Nats.raku API Documentation" > _site/api/index.md
          echo "" >> _site/api/index.md
          echo "## Modules" >> _site/api/index.md
          echo "" >> _site/api/index.md
          
          for file in _site/api/*.md; do
            if [ "$(basename $file)" != "index.md" ]; then
              name=$(basename $file .md | sed 's|_|::|g')
              echo "- [$name]($(basename $file))" >> _site/api/index.md
            fi
          done
          
          # Copy README as main page
          cp README.md _site/index.md 2>/dev/null || echo "# Nats.raku" > _site/index.md
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
