name: Documentation

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create static HTML site
        run: |
          mkdir -p _site
          
          # Create index.html
          cat << 'HTMLEOF' > _site/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Nats.raku</title>
            <style>
              body { font-family: sans-serif; max-width: 900px; margin: 2em auto; padding: 0 1em; }
              h1 { color: #2c3e50; }
              a { color: #3498db; }
            </style>
          </head>
          <body>
            <h1>Nats.raku</h1>
            <p>Raku client for NATS.io messaging system</p>
            <p><a href="https://github.com/FCO-openclaw/nats.raku">GitHub Repository</a></p>
            <p><a href="/api/">API Documentation</a></p>
            <hr>
            <p>See README on GitHub for full documentation.</p>
          </body>
          </html>
          HTMLEOF
          
          # Create api/index.html
          mkdir -p _site/api
          cat << 'HTMLEOF' > _site/api/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Nats.raku API</title>
            <style>
              body { font-family: sans-serif; max-width: 900px; margin: 2em auto; padding: 0 1em; }
              h1 { color: #2c3e50; }
              a { color: #3498db; }
            </style>
          </head>
          <body>
            <h1>Nats.raku API Documentation</h1>
            <p><a href="/">Back to main</a></p>
            <hr>
            <p>API documentation is available in the source files:</p>
            <ul>
              <li><a href="https://github.com/FCO-openclaw/nats.raku/tree/main/lib">lib/</a> - Core modules</li>
              <li><a href="https://github.com/FCO-openclaw/nats.raku/tree/main/lib/Nats/JetStream">lib/Nats/JetStream/</a> - JetStream modules</li>
            </ul>
          </body>
          </html>
          HTMLEOF
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
