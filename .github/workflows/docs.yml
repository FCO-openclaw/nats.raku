name: Documentation

on:
  push:
    branches: [ main, master, feat/jetstream-support ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v3
        
      - name: Create simple docs
        run: |
          mkdir -p _site
          echo "# Nats.raku Documentation" > _site/index.md
          echo "" >> _site/index.md
          echo "See [README](https://github.com/FCO-openclaw/nats.raku#readme) for now." >> _site/index.md
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: docs
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v2
