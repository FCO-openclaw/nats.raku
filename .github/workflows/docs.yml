name: Documentation

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate HTML Documentation
        run: |
          mkdir -p _site/api
          
          # Create main index.html from README
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Nats.raku - Raku client for NATS.io</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 900px; margin: 2em auto; padding: 0 1em; line-height: 1.6; color: #333; }
              h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 0.3em; }
              h2 { color: #34495e; margin-top: 1.5em; }
              code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-family: Consolas, monospace; }
              pre { background: #f4f4f4; padding: 1em; border-radius: 5px; overflow-x: auto; }
              a { color: #3498db; text-decoration: none; }
              a:hover { text-decoration: underline; }
              .header { background: #2c3e50; color: white; padding: 1em; margin: -2em -1em 2em -1em; }
              .header a { color: #3498db; }
            </style>
          </head>
          <body>
            <div class="header">
              <h1>Nats.raku</h1>
              <p>Raku client for NATS.io messaging system</p>
              <p><a href="https://github.com/FCO-openclaw/nats.raku">GitHub Repository</a></p>
            </div>
          EOF
          
          # Add README content
          cat README.md | sed 's/^#/##/' | sed 's/```/~~~/' >> _site/index.html
          
          # Close HTML
          cat >> _site/index.html << 'EOF'
            <hr>
            <p><a href="/api/">📚 API Documentation →</a></p>
          </body>
          </html>
          EOF
          
          # Create API index
          cat > _site/api/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Nats.raku API Documentation</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 900px; margin: 2em auto; padding: 0 1em; line-height: 1.6; color: #333; }
              h1 { color: #2c3e50; }
              ul { list-style: none; padding: 0; }
              li { margin: 0.8em 0; padding: 0.5em; background: #f8f9fa; border-radius: 4px; }
              a { color: #3498db; text-decoration: none; font-weight: 500; }
              a:hover { text-decoration: underline; }
              .back { margin-top: 2em; }
            </style>
          </head>
          <body>
            <h1>📚 Nats.raku API Documentation</h1>
            <p>API documentation is generated from POD6 comments in the source code.</p>
            
            <h2>Core Modules</h2>
            <ul>
              <li><a href="https://github.com/FCO-openclaw/nats.raku/blob/main/lib/Nats.rakumod">Nats</a> - Core NATS client</li>
              <li><a href="https://github.com/FCO-openclaw/nats.raku/blob/main/lib/Nats/JetStream.rakumod">Nats::JetStream</a> - JetStream support</li>
              <li><a href="https://github.com/FCO-openclaw/nats.raku/blob/main/lib/Nats/Client.rakumod">Nats::Client</a> - Structured client</li>
              <li><a href="https://github.com/FCO-openclaw/nats.raku/blob/main/lib/Nats/Subscriptions.rakumod">Nats::Subscriptions</a> - Subscription DSL</li>
            </ul>
            
            <h2>JetStream Modules</h2>
            <ul>
              <li><a href="https://github.com/FCO-openclaw/nats.raku/blob/main/lib/Nats/JetStream/Ackable.rakumod">Nats::JetStream::Ackable</a> - Message acknowledgments</li>
              <li><a href="https://github.com/FCO-openclaw/nats.raku/blob/main/lib/Nats/JetStream/Client.rakumod">Nats::JetStream::Client</a> - Structured JetStream client</li>
              <li><a href="https://github.com/FCO-openclaw/nats.raku/blob/main/lib/Nats/JetStream/OrderedConsumer.rakumod">Nats::JetStream::OrderedConsumer</a> - Ordered consumers</li>
            </ul>
            
            <p class="back"><a href="/">← Back to main documentation</a></p>
          </body>
          </html>
          EOF
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
