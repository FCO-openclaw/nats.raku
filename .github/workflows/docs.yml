name: Documentation

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Raku
        run: |
          sudo apt-get update
          sudo apt-get install -y rakudo
          
          # Install zef
          git clone https://github.com/ugexe/zef.git /tmp/zef
          cd /tmp/zef
          raku -I. bin/zef install .
          echo "$HOME/.raku/bin" >> $GITHUB_PATH

      - name: Install Raku dependencies
        run: |
          export PATH="$HOME/.raku/bin:$PATH"
          zef install --/test Pod::To::HTML Pod::Load

      - name: Generate HTML Documentation
        run: |
          export PATH="$HOME/.raku/bin:$PATH"
          mkdir -p _site
          raku .github/scripts/generate-docs.raku

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
